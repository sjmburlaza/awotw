@if (!isLoading) {
  <header class="header">
    <nav class="header__globe" aria-label="Primary navigation">
      <button
        type="button"
        class="header__globe__home"
        (click)="goToHomePage()"
        aria-label="Go to home page"
      >
        <i class="bi bi-globe"></i>
        @if (currentUrl !== URL_PATH.HOME) {
          <span [ngClass]="{ 'move-right': isHomeClicked }">AWOTW</span>
        }
      </button>
      @if (currentUrl === URL_PATH.HOME) {
        <button type="button" (click)="goToMapPage()">
          <span class="url-path">Map</span>
        </button>
        <button type="button" (click)="goToTimelinePage()">
          <span class="url-path">Timeline</span>
        </button>
        <button type="button" (click)="goToChartsPage()">
          <span class="url-path">Charts</span>
        </button>
        <button type="button" (click)="goToGamesPage()">
          <span class="url-path">Games!!</span>
        </button>
      }
    </nav>
    <div class="title" [ngClass]="{ 'zoom-in-text': zoomInText }">
      @if (currentUrl === URL_PATH.HOME) {
        {{ 'Architectural Wonders of the World' | uppercase }}
      }
    </div>
    <div class="button">
      <form class="button__search-bar" role="search" (ngSubmit)="onSearch()">
        <label class="visually-hidden" for="site-search">Search architectural wonders</label>
        <button type="submit" aria-label="Submit search">
          <i class="bi bi-search"></i>
        </button>
        <input
          id="site-search"
          name="searchQuery"
          type="text"
          placeholder="Search..."
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearch()"
        />
      </form>
      <div class="button__quiz">
        <button type="button" (click)="goToQuizPage()">
          <span>Quiz Me!!</span>
        </button>
      </div>
      <div class="button__bg-mode">
        <button
          type="button"
          (click)="onToggleBgMode()"
          [attr.aria-pressed]="isDarkMode"
          [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (isDarkMode) {
            <i class="bi bi-sun"></i>
          } @else {
            <i class="bi bi-moon"></i>
          }
        </button>
      </div>
    </div>
  </header>
}
