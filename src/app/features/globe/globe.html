@if (isLoading) {
  <div class="loader">
    <app-loader></app-loader>
  </div>
}
<div class="globe-wrapper" [class.hidden]="isLoading">
  <div
    #globeContainer
    class="globe-container"
    role="region"
    aria-label="Interactive 3D globe of architectural wonder locations"
  ></div>

  @if (errorMessage) {
    <div class="state-message error-message">{{ errorMessage }}</div>
  } @else if (!hasMarkers) {
    <div class="state-message">No globe markers available.</div>
  }

  @if (selectedWonder; as wonder) {
    @if (popupPosition; as position) {
      <div
        class="popup-card"
        role="dialog"
        aria-label="Selected wonder details"
        [style.left.px]="position.left"
        [style.top.px]="position.top"
      >
        <button
          type="button"
          class="close-btn"
          (click)="clearSelectedWonder()"
          aria-label="Close selected wonder details"
        >
          x
        </button>
        <strong>{{ wonder.name }}</strong>
        <div>
          <em>{{ wonder.location }}</em>
        </div>
        <img [src]="wonder.imageURL" [alt]="wonder.name" width="180" />
        <div>
          <a
            [href]="wonder.descriptionURL"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="'Open reference page for ' + wonder.name"
          >
            Learn more
          </a>
        </div>
      </div>
    }
  }
</div>
<div class="navigator" [class.hidden]="isLoading">
  <a routerLink="/map">Switch to 2D map</a>
</div>
