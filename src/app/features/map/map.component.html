<div class="map-container">
  <header class="page-heading" aria-labelledby="map-page-title">
    <span class="page-heading__eyebrow">Explore by location</span>
    <div class="page-heading__title-row">
      <h1 id="map-page-title" class="page-heading__title">Landmarks across the map</h1>
      <span class="page-heading__icon" aria-hidden="true">
        <i class="bi bi-pin-map"></i>
      </span>
    </div>
  </header>
  <div class="navigator">
    <a routerLink="/globe">Switch to globe</a>
    <a routerLink="/games/geoguesser">Play GeoGuesser</a>
  </div>
  <div id="map" role="region" aria-label="Interactive 2D map of architectural wonders"></div>
  @if (errorMessage) {
    <div class="state-message error-message">{{ errorMessage }}</div>
  } @else if (!hasMarkers) {
    <div class="state-message">No map markers available.</div>
  }
</div>
