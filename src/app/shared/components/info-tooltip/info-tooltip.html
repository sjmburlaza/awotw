<span class="info-tooltip">
  <button
    type="button"
    class="info-tooltip__trigger"
    [attr.aria-label]="ariaLabel"
    [attr.aria-describedby]="resolvedTooltipId"
  >
    <i class="bi bi-info-circle"></i>
  </button>
  <span
    [id]="resolvedTooltipId"
    class="info-tooltip__content"
    [class.info-tooltip__content--media]="imageSrc"
    [class.info-tooltip__content--right]="placement === 'right'"
    role="tooltip"
  >
    @if (text) {
      <span class="info-tooltip__text">{{ text }}</span>
    }
    @if (imageSrc) {
      <img
        class="info-tooltip__image"
        [src]="imageSrc"
        [alt]="imageAlt"
        loading="lazy"
        decoding="async"
      />
    }
  </span>
</span>
